name: Claude Code

# @claude 멘션이 PR/이슈/코멘트에 오면 Claude가 자동으로 응답하고 코드 작업
# 사전 준비:
#   1) Anthropic의 Claude Code GitHub App을 조직에 설치
#   2) Repo Secrets에 ANTHROPIC_API_KEY 등록
#   3) Linear MCP 사용을 위한 LINEAR_API_KEY도 함께 등록 (선택)

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  pull_request_review:
    types: [submitted]
  issues:
    types: [opened, assigned]

jobs:
  claude:
    if: |
      (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review' && contains(github.event.review.body, '@claude')) ||
      (github.event_name == 'issues' && (contains(github.event.issue.body, '@claude') || contains(github.event.issue.title, '@claude')))

    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Claude Code
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}

          # 레포의 CLAUDE.md를 자동으로 읽어 모든 컨벤션을 그대로 따름

          mcp_config: |
            {
              "mcpServers": {
                "linear": {
                  "type": "http",
                  "url": "https://mcp.linear.app/mcp",
                  "headers": {
                    "Authorization": "Bearer ${{ secrets.LINEAR_API_KEY }}"
                  }
                }
              }
            }

          allowed_tools: |
            Bash(git:*)
            Bash(gh pr:*)
            Bash(gh issue:*)
            Bash(pnpm:*)
            Bash(npx:*)
            Bash(make:*)
            mcp__linear__*
