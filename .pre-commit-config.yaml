# Pre-commit 훅: 커밋 직전 자동 검사
# 설치: pre-commit install --install-hooks   (default_install_hook_types 로 3종 자동 등록)
#
# PR-only 강제(ADR-003 gitflow 4축): pre-push 단계 guard-protected-branch 가 보호 브랜치
# (master/prod/dev) 직접 push 차단. default_install 없이 install 하면 pre-push·commit-msg 미설치.
default_install_hook_types: [pre-commit, commit-msg, pre-push]

repos:
  # ── 일반 위생 검사 ─────────────────────────────────────
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-json
        exclude: |
          (?x)^(
            \.claude/settings\.json|
            \.devcontainer/devcontainer\.json|
            tsconfig\.json
          )$
      - id: check-added-large-files
        args: ['--maxkb=500']
      - id: check-merge-conflict
      - id: detect-private-key
      - id: mixed-line-ending
        args: ['--fix=lf']

  # ── 시크릿 누출 차단 ───────────────────────────────────
  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.21.2
    hooks:
      - id: gitleaks

  # ── 로컬: pnpm 기반 lint / format / typecheck ─────────
  - repo: local
    hooks:
      - id: prettier
        name: prettier --check
        entry: pnpm exec prettier --check
        language: system
        types_or: [javascript, jsx, ts, tsx, json, yaml, css, html]
        pass_filenames: true
      - id: eslint
        name: eslint
        entry: pnpm exec eslint
        language: system
        types_or: [javascript, jsx, ts, tsx]
        pass_filenames: true
      - id: tsc
        name: tsc --noEmit
        entry: pnpm exec tsc --noEmit
        language: system
        pass_filenames: false
        always_run: true

  # ── Conventional Commits 메시지 검증 ──────────────────
  - repo: https://github.com/compilerla/conventional-pre-commit
    rev: v3.6.0
    hooks:
      - id: conventional-pre-commit
        stages: [commit-msg]
        args:
          [
            'feat',
            'fix',
            'refactor',
            'perf',
            'docs',
            'style',
            'test',
            'chore',
            'ci',
            'build',
            'revert',
          ]

  # ── PR-only 가드 (gitflow 4축 보호 브랜치 직접 push 차단 + work 자유, ADR-003) ──
  - repo: local
    hooks:
      - id: guard-protected-branch
        name: PR-only 가드 (보호 브랜치 직접 push 차단)
        entry: scripts/git-hooks/guard-protected-branch.sh
        language: script
        stages: [pre-push]
        always_run: true
        pass_filenames: false
